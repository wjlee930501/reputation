name: CI

on:
  pull_request:
  push:
    branches:
      - main

# 최소 권한 — 어떤 잡도 리포 쓰기/패키지 권한이 필요 없다.
permissions:
  contents: read

# 같은 ref에 새 푸시가 오면 진행 중인 이전 실행을 취소 (CI 자원 절약).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend lint and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Real Postgres so the integration suite (constraints, audit append-only
    # trigger, FK indexes — TEST-1) actually runs instead of skipping.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reputation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      # tests/conftest.py가 test-admin-key로 강제 설정한다 — 여기 값과 어긋나도 무방하지만
      # 혼동을 줄이기 위해 동일 값 사용.
      ADMIN_SECRET_KEY: test-admin-key
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/reputation_test
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/reputation_test
      INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/reputation_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Migrate test database
        run: python -m alembic upgrade head

      - name: Pytest (unit + integration, coverage gate)
        run: python -m pytest --cov=app --cov-report=term --cov-fail-under=60

  frontend:
    name: Frontend tests and builds
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - site
          - admin
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          NEXT_PUBLIC_SITE_URL: https://reputation.co.kr
          NEXT_PUBLIC_API_URL: https://reputation.co.kr/api/v1/public
          NEXT_PUBLIC_BACKEND_URL: https://reputation.co.kr
          BACKEND_URL: https://reputation.co.kr
        run: npm run build

  terraform:
    name: Terraform fmt and validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
            dockerfile: backend/Dockerfile
            build_args: ""
          # site/admin은 NEXT_PUBLIC_* 가 빌드 시점에 번들로 인라인되며, site 설정은
          # 프로덕션 빌드에서 NEXT_PUBLIC_SITE_URL 누락 시 명시적으로 실패한다. CI는
          # 빌드 검증만 하므로 placeholder https URL을 주입한다(실제 값은 deploy.sh가 주입).
          - name: site
            context: site
            dockerfile: site/Dockerfile
            build_args: >-
              --build-arg NEXT_PUBLIC_SITE_URL=https://reputation.co.kr
              --build-arg NEXT_PUBLIC_API_URL=https://reputation.co.kr/api/v1/public
              --build-arg NEXT_PUBLIC_BACKEND_URL=https://reputation.co.kr
          - name: admin
            context: admin
            dockerfile: admin/Dockerfile
            build_args: >-
              --build-arg NEXT_PUBLIC_BACKEND_URL=https://reputation.co.kr
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 빌드만 검증 — 푸시 없음 (이미지 롤아웃은 scripts/deploy.sh 담당).
      - name: Build ${{ matrix.name }} image
        run: docker build ${{ matrix.build_args }} -f "${{ matrix.dockerfile }}" -t "ci-${{ matrix.name }}:${{ github.sha }}" "${{ matrix.context }}"

  # INFRA-4: Security scanning gate.
  #   - Dependency audits are non-blocking (continue-on-error) so they surface
  #     findings without halting delivery on transitive-dep noise.
  #   - The secret scan is BLOCKING: a committed credential should fail CI.
  security:
    name: Security scans (deps + secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs full history to scan commits

      # ── Backend dependency vulnerability scan (warn) ──────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Backend pip-audit
        continue-on-error: true
        working-directory: backend
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit .

      # ── Frontend dependency vulnerability scan (warn) ─────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Site npm audit
        continue-on-error: true
        working-directory: site
        run: npm audit --audit-level=high

      - name: Admin npm audit
        continue-on-error: true
        working-directory: admin
        run: npm audit --audit-level=high

      # ── Secret scanning (blocking) ────────────────────────────────
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
