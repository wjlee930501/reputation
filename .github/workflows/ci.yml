name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend lint and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Pytest
        run: python -m pytest

  frontend:
    name: Frontend tests and builds
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - site
          - admin
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # INFRA-4: Security scanning gate.
  #   - Dependency audits are non-blocking (continue-on-error) so they surface
  #     findings without halting delivery on transitive-dep noise.
  #   - The secret scan is BLOCKING: a committed credential should fail CI.
  security:
    name: Security scans (deps + secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs full history to scan commits

      # ── Backend dependency vulnerability scan (warn) ──────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Backend pip-audit
        continue-on-error: true
        working-directory: backend
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit .

      # ── Frontend dependency vulnerability scan (warn) ─────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Site npm audit
        continue-on-error: true
        working-directory: site
        run: npm audit --audit-level=high

      - name: Admin npm audit
        continue-on-error: true
        working-directory: admin
        run: npm audit --audit-level=high

      # ── Secret scanning (blocking) ────────────────────────────────
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
